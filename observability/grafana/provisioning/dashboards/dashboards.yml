# Grafana Dashboard Provisioning
# Auto-loads dashboards from this directory

apiVersion: 1

providers:
  - name: 'NeuroGrid'
    orgId: 1
    folder: 'NeuroGrid'
    folderUid: 'neurogrid'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
